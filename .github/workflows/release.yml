name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package tarball
        run: |
          ARCHIVE="aside-${{ steps.version.outputs.version }}-aarch64-apple-darwin.tar.gz"
          tar czf "$ARCHIVE" \
            -C target/release aside \
            -C "$GITHUB_WORKSPACE" aside.py SKILL.md install.sh LICENSE
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        if: env.HOMEBREW_TAP_TOKEN != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256=$(cut -d ' ' -f1 "$ARCHIVE.sha256")
          BINARY_URL="https://github.com/jshph/aside/releases/download/v${VERSION}/aside-${VERSION}-aarch64-apple-darwin.tar.gz"

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/jshph/homebrew-aside.git _tap
          cd _tap
          sed -i '' "s|url \".*\"|url \"${BINARY_URL}\"|" Formula/aside.rb
          sed -i '' "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/aside.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/aside.rb
          git commit -m "Update aside to ${VERSION}"
          git push origin master
